# =============================
# H2 Database Configuration
# =============================
spring.datasource.url=jdbc:h2:file:./data/db;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE;TRACE_LEVEL_FILE=0
spring.datasource.username=sa
spring.datasource.password=

# Tự động chạy schema.sql + data.sql
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

# H2 Console (chỉ bật ở dev)
spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console 

# =============================
# Spring Doc / Swagger
# =============================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# =============================
# Logging (hữu ích khi debug)
# =============================
logging.level.root=INFO
logging.level.com.cleanarch=DEBUG
logging.level.org.springframework.jdbc=DEBUG
# logging.level.org.hibernate=DEBUG   # IF use JPA
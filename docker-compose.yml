version: "3.8"

services:
  cleanarch-from-mr_duc:
    container_name: cleanarch-from-mr_duc
    image: cleanarch-from-mr_duc:latest
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 700M
      restart_policy:
        condition: on-failure